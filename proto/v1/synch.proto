// SYNCH 心契协议 — 主协议定义
// 包含：节点身份、多服务端会话、权限模型
syntax = "proto3";

package synch.v1;

option go_package = "synch/v1;synchv1";

// ============================================================
//  节点身份 (Node Identity)
// ============================================================

// NodeType 标识节点的角色类型
enum NodeType {
  NODE_TYPE_UNSPECIFIED = 0;
  NODE_TYPE_AGENT       = 1;   // AI助手、自动化脚本
  NODE_TYPE_HUMAN       = 2;   // 人、管理员
  NODE_TYPE_BRIDGE      = 3;   // 协议转换、外部系统对接
  NODE_TYPE_PLUGIN      = 4;   // 宿主环境插件 (vcp-agent, openclaw-agent)
  NODE_TYPE_MOBILE      = 5;   // 移动端 App (Android/iOS)
}

// NodeIdentity 描述网络中的一个节点身份
message NodeIdentity {
  // 节点唯一标识, 格式: "agent://{pk}" | "plugin://{pk}" | "mobile://{pk}" ...
  string node_id = 1;

  // Ed25519 公钥 (32 bytes)
  bytes public_key = 2;

  // 节点类型
  NodeType node_type = 3;

  // 宿主平台: "vcp-agent" | "openclaw" | "android" | "ios" ...
  string platform = 4;

  // 能力声明: "chat", "tools", "rag-local", "vault-sync", "ui-panel" ...
  repeated string capabilities = 5;

  // 注册时间 (Unix epoch millis)
  uint64 registered_at = 6;

  // 人类可读的显示名称
  string display_name = 7;
}

// ============================================================
//  多服务端会话 (Multi-Server Session)
// ============================================================

// ServerRole 标识客户端与服务端的关系
enum ServerRole {
  SERVER_ROLE_UNSPECIFIED = 0;
  SERVER_ROLE_PRIMARY     = 1;  // 主服务端，拥有完整权限
  SERVER_ROLE_SECONDARY   = 2;  // 备用/镜像服务端
  SERVER_ROLE_GUEST       = 3;  // 访客身份，受限权限
}

// ServerEndpoint 描述一个客户端连接的服务端
message ServerEndpoint {
  // 服务端唯一 ID (如 "home-fnos", "friend-bob")
  string server_id = 1;

  // WebSocket/gRPC 连接地址 (如 "wss://home.synch.local:8081")
  string url = 2;

  // 此客户端在该服务端上的角色
  ServerRole role = 3;

  // 该服务端上各 Vault 的权限映射: vault_id -> VaultPermission
  map<string, VaultPermission> vault_access = 4;

  // 人类可读的服务端名称 (如 "家里心契")
  string display_name = 5;

  // 是否自动连接
  bool auto_connect = 6;

  // 邀请码 (用于 GUEST 角色加入)
  string invite_code = 7;
}

// ============================================================
//  权限模型
// ============================================================

// PermissionLevel 标识对 Vault 的操作权限
enum PermissionLevel {
  PERMISSION_LEVEL_UNSPECIFIED = 0;
  PERMISSION_LEVEL_READ        = 1;  // 只读
  PERMISSION_LEVEL_WRITE       = 2;  // 读写
  PERMISSION_LEVEL_ADMIN       = 3;  // 完全控制 (含 ACL 管理)
}

// VaultPermission 描述对单个 Vault 的权限
message VaultPermission {
  // Vault 唯一 ID: Blake3(vault_root_path + owner_pubkey)[0:16]
  string vault_id = 1;

  // 权限级别
  PermissionLevel level = 2;

  // 用设备密钥加密的 Vault 密钥 (AES-256-GCM wrapped)
  bytes vault_key_encrypted = 3;
}

// ============================================================
//  客户端配置
// ============================================================

// ClientProfile 描述客户端的身份与多服务端配置
message ClientProfile {
  // 此客户端的身份
  NodeIdentity identity = 1;

  // 连接的所有服务端
  repeated ServerEndpoint servers = 2;

  // 同步配置
  SyncConfig sync_config = 3;
}

// SyncConfig 全局同步偏好设置
message SyncConfig {
  // 冲突处理策略
  ConflictStrategy conflict_strategy = 1;

  // 带宽限制 (KB/s), 0 = 无限制
  uint32 bandwidth_limit_kbps = 2;

  // 移动网络同步策略
  MobileSyncPolicy mobile_sync_policy = 3;
}

// ConflictStrategy 冲突解决策略枚举
enum ConflictStrategy {
  CONFLICT_STRATEGY_UNSPECIFIED  = 0;
  CONFLICT_STRATEGY_AUTO_LOCAL   = 1;  // 本地优先
  CONFLICT_STRATEGY_AUTO_REMOTE  = 2;  // 远端优先
  CONFLICT_STRATEGY_ASK          = 3;  // 询问用户
}

// MobileSyncPolicy 移动端同步策略
enum MobileSyncPolicy {
  MOBILE_SYNC_POLICY_UNSPECIFIED = 0;
  MOBILE_SYNC_POLICY_ALWAYS      = 1;  // 始终同步
  MOBILE_SYNC_POLICY_WIFI_ONLY   = 2;  // 仅在 Wi-Fi 下同步
  MOBILE_SYNC_POLICY_MANUAL      = 3;  // 手动触发
}
