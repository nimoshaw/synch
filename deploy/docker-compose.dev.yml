services:
  relay:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "${SYNCH_WS_PORT:-8080}:8080"
    env_file:
      - ../config/dev.env
    volumes:
      - synch_dev_data:/data
    networks:
      - synch_dev
    restart: unless-stopped

networks:
  synch_dev:
    driver: bridge

volumes:
  synch_dev_data:
