version: '3.8'

services:
  relay:
    image: ghcr.io/${GITHUB_REPOSITORY:-synch}/relay:latest
    ports:
      - "${SERVER_PORT:-8081}:8081"
    env_file:
      - ../config/staging.env
    depends_on:
      - redis
    networks:
      - synch_staging
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  redis:
    image: redis:7-alpine
    networks:
      - synch_staging
    volumes:
      - redis_staging_data:/data
    restart: always

networks:
  synch_staging:
    driver: bridge

volumes:
  redis_staging_data:
