services:
  relay:
    image: ghcr.io/${GITHUB_REPOSITORY:-synch}/relay:latest
    ports:
      - "${SYNCH_WS_PORT:-8080}:8080"
    env_file:
      - ../config/staging.env
    volumes:
      - synch_staging_data:/data
    networks:
      - synch_staging
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  synch_staging:
    driver: bridge

volumes:
  synch_staging_data:
