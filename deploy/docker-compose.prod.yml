services:
  relay:
    image: ghcr.io/${GITHUB_REPOSITORY:-synch}/relay:${APP_VERSION:-v0.1.0}
    expose:
      - "8080"
    env_file:
      - ../config/prod.env
    volumes:
      - synch_prod_data:/data
    networks:
      - synch_prod
    restart: always
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - synch_prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

networks:
  synch_prod:
    driver: overlay

volumes:
  synch_prod_data:
