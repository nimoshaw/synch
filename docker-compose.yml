services:
  synch-relay:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      - SYNCH_MODE=development
      - SYNCH_WS_PORT=:8080
      - SYNCH_LOG_LEVEL=info
      - SYNCH_DB_PATH=/data/relay_db
    volumes:
      - synch-data:/data
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  synch-data:
