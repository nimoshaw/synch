name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==================== Build Rust Core (Multi-Platform) ====================
  build-rust:
    name: Build Rust Core (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            lib_ext: dll
            static_ext: lib
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            lib_ext: so
            static_ext: a
          - target: x86_64-apple-darwin
            os: macos-latest
            lib_ext: dylib
            static_ext: a
          - target: aarch64-apple-darwin
            os: macos-latest
            lib_ext: dylib
            static_ext: a
          - target: aarch64-linux-android
            os: ubuntu-latest
            lib_ext: so
            static_ext: a
          - target: armv7-linux-androideabi
            os: ubuntu-latest
            lib_ext: so
            static_ext: a
          - target: x86_64-linux-android
            os: ubuntu-latest
            lib_ext: so
            static_ext: a
          - target: i686-linux-android
            os: ubuntu-latest
            lib_ext: so
            static_ext: a

    steps:
      - uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install protoc

      - name: Setup Android NDK
        if: contains(matrix.target, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Build Rust library
        run: task build:core
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ contains(matrix.target, 'android') && '${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang' || '' }}

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.target }}
          cp core/target/${{ matrix.target }}/release/*synch* dist/${{ matrix.target }}/ 2>/dev/null || true
          cd dist && tar czf synch-core-${{ matrix.target }}.tar.gz ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-core-${{ matrix.target }}
          path: dist/synch-core-*.tar.gz

  # ==================== Build Go Relay Server ====================
  build-go:
    name: Build Go Relay (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            ext: .exe
          - target: linux-amd64
            os: ubuntu-latest
            ext: ''
          - target: darwin-amd64
            os: macos-latest
            ext: ''
          - target: darwin-arm64
            os: macos-latest
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protobuf
        uses: arduino/setup-protoc@v3

      - name: Generate protobuf code
        run: task proto:gen

      - name: Build binary
        env:
          GOOS: ${{ contains(matrix.target, 'windows') && 'windows' || contains(matrix.target, 'darwin') && 'darwin' || 'linux' }}
          GOARCH: ${{ contains(matrix.target, 'arm64') && 'arm64' || 'amd64' }}
        run: |
          go mod download
          task build:server

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          tar czf dist/synch-relay-${{ matrix.target }}.tar.gz -C server relay${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-relay-${{ matrix.target }}
          path: dist/synch-relay-*.tar.gz

  # ==================== Build Android AAR ====================
  build-android:
    name: Build Android AAR
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Download Rust Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-core-*-android
          path: core/target/ndk-artifacts

      - name: Build Rust for Android
        working-directory: core
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 -o ../clients/mobile/android/app/src/main/jniLibs build --release

      - name: Generate UniFFI bindings
        working-directory: core
        run: |
          cargo run --bin uniffi-bindgen generate --library target/aarch64-linux-android/release/libsynch_ffi.so --language kotlin --out-dir ../clients/mobile/android/app/src/main/java/

      - name: Build AAR
        working-directory: clients/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: clients/mobile/android/app/build/outputs/aar/*.aar

  # ==================== Create Release ====================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust, build-go, build-android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.aar" | xargs sha256sum > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo HEAD~10)..HEAD >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Checksums" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md
          cat artifacts/checksums.txt >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.aar
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}