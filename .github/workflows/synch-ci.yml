name: Synch CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.21'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      contracts-changed: ${{ steps.changes.outputs.contracts }}
      modules-changed: ${{ steps.changes.outputs.modules }}
      affected-modules: ${{ steps.affected.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            contracts:
              - 'contracts/**'
            modules:
              - 'src/modules/**'
            shared:
              - 'src/shared/**'
      - name: Calculate affected modules
        id: affected
        run: |
          node scripts/ci/calculate-affected.js \
            --base ${{ github.event.pull_request.base.sha || 'HEAD~1' }} \
            --head ${{ github.sha }} \
            --output modules

  contract-compliance:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.contracts-changed == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run contracts:build
      - run: npm run test:contracts
      - run: node scripts/ci/check-contract-version.js
      - run: node scripts/ci/detect-breaking-changes.js
      - uses: actions/upload-artifact@v4
        with:
          name: contract-definitions
          path: |
            contracts/dist/
            .synch/contracts/

  module-unit-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, contract-compliance]
    if: ${{ needs.detect-changes.outputs.modules-changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.affected-modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: contract-definitions
      - run: npm run test:unit -- --module=${{ matrix.module }}
        env:
          CI: true
          NODE_ENV: test
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/${{ matrix.module }}/lcov.info
          flags: ${{ matrix.module }}
          name: ${{ matrix.module }}-coverage

  integration-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, contract-compliance, module-unit-tests]
    if: |
      always() && 
      (needs.contract-compliance.result == 'success' || needs.contract-compliance.result == 'skipped') &&
      (needs.module-unit-tests.result == 'success' || needs.module-unit-tests.result == 'skipped')
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: synch_test
          POSTGRES_PASSWORD: synch_test
          POSTGRES_DB: synch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        ports:
          - 8123:8123
          - 9000:9000
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        ports:
          - 2181:2181
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: contract-definitions
      - run: npm run db:migrate:test
      - run: npm run db:seed:test
      - run: npm run test:integration
        env:
          DATABASE_URL: postgresql://synch_test:synch_test@localhost:5432/synch_test
          REDIS_URL: redis://localhost:6379
          CLICKHOUSE_URL: http://localhost:8123
          KAFKA_BROKERS: localhost:9092
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            test-results/integration/
            coverage/integration/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: |
          npm run start:test &
          npx wait-on http://localhost:3000/health --timeout 60000
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/e2e/
            screenshots/
            videos/

  performance-baseline:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: k6 run --out json=test-results/perf.json tests/perf/*.js
      - run: node scripts/ci/compare-perf-baseline.js
      - uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: test-results/perf.json

  build-and-release:
    runs-on: ubuntu-latest
    needs: [contract-compliance, module-unit-tests, integration-tests]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prod
      - run: npm audit --audit-level=moderate
      - run: npm run sbom:generate
      - uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            dist/
            sbom.json

  test-summary:
    runs-on: ubuntu-latest
    needs: [contract-compliance, module-unit-tests, integration-tests, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: test-results/
      - run: node scripts/ci/generate-test-report.js
      - uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-results/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });