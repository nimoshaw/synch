version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/core"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/clients/plugins/vcp-agent"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/server"
    schedule:
      interval: "weekly"
