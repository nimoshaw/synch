# SYNCH 心契协议
# version: v2.0-phase1

version: '3'

tasks:
  default:
    desc: 显示可用任务
    cmds:
      - task --list

  init:
    desc: 初始化开发环境 (Rust, Buf, Go, TS)
    cmds:
      - echo "Checking dependencies..."
      - rustc --version
      - go version
      - node --version
      - buf --version || echo "Buf not found, please install from https://buf.build"

  proto:gen:
    desc: 从 .proto 文件生成 Go, TS, Rust 契约代码
    dir: proto
    cmds:
      - buf generate

  build:core:
    desc: 构建 Rust 核心库 (FFI 准备)
    dir: core
    cmds:
      - cargo build --release

  build:server:
    desc: 构建 Go 服务器二进制
    dir: server
    cmds:
      - go build -o cmd/relay/relay cmd/relay/main.go

  build:vcp-agent:
    desc: 构建 VCP 插件
    dir: clients/plugins/vcp-agent
    cmds:
      - npm install
      - npm run build

  relay:up:
    desc: 启动本地中继服务器 (Docker)
    cmds:
      - docker compose up -d

  test:all:
    desc: 运行所有测试
    cmds:
      - echo "Running core, server and client tests..."
      - task test:e2e

  test:e2e:
    desc: 运行 E2E 端到端测试
    dir: tests/e2e
    cmds:
      - npm install
      - npx vitest run --coverage

  deploy:dev:
    desc: 本地启动开发环境 (Docker Compose)
    dir: deploy
    cmds:
      - docker compose -f docker-compose.dev.yml up -d --build
      - echo "Dev environment is running on port 8081"

  deploy:staging:
    desc: 部署到测试环境 (Docker Compose Mode)
    dir: deploy
    cmds:
      - docker compose -f docker-compose.staging.yml pull
      - docker compose -f docker-compose.staging.yml up -d

  deploy:prod:
    desc: 生产环境部署 (需要人工确认)
    dir: deploy
    cmds:
      - 'echo "!!! PRODUCTION DEPLOYMENT !!!"'
      - 'echo "Please confirm by running: docker compose -f docker-compose.prod.yml up -d"'

  release:check:
    desc: 验证发布准备是否就绪 (v0.1.0)
    cmds:
      - echo "Checking version numbers..."
      - powershell -Command "Select-String '0.1.0' core/Cargo.toml"
      - powershell -Command "Select-String '0.1.0' clients/plugins/vcp-agent/package.json"
      - powershell -Command "Select-String '0.1.0' clients/mobile/android/app/build.gradle.kts"
      - echo "Checking documentation..."
      - powershell -Command "if (Test-Path README.md) { echo 'README OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path docs/API.md) { echo 'API OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path docs/CONTRIBUTING.md) { echo 'CONTRIBUTING OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path docs/SECURITY.md) { echo 'SECURITY OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path docs/ROADMAP.md) { echo 'ROADMAP OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path LICENSE) { echo 'LICENSE OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path docs/DEPLOYMENT.md) { echo 'DEPLOYMENT OK' } else { exit 1 }"
      - echo "Checking project governance..."
      - powershell -Command "if (Test-Path .github/ISSUE_TEMPLATE/bug_report.md) { echo 'Bug Report OK' } else { exit 1 }"
      - powershell -Command "if (Test-Path .github/dependabot.yml) { echo 'Dependabot OK' } else { exit 1 }"
      - echo "All release checks passed for v0.1.0!"
